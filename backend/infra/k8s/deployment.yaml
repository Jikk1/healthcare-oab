# ============================================================
# HealthCareOAB+ API — Kubernetes deployment
# Apply order: namespace → secret/configmap → migrate Job → deployment/service/hpa → ingress
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: healthcare-oab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oab-api-config
  namespace: healthcare-oab
data:
  NODE_ENV: "production"
  PORT: "8080"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  SERVICE_NAME: "healthcare-oab-api"
  CORS_ORIGINS: "https://app.healthcare-oab.example"
  COOKIE_DOMAIN: "healthcare-oab.example"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability:4318"
  METRICS_ENABLED: "true"
---
# NOTE: in real clusters these come from an external secrets manager
# (Vault / AWS Secrets Manager via External Secrets Operator), never committed.
apiVersion: v1
kind: Secret
metadata:
  name: oab-api-secrets
  namespace: healthcare-oab
type: Opaque
stringData:
  DATABASE_URL: "postgresql://oab:CHANGE_ME@postgres.healthcare-oab:5432/healthcare_oab?schema=public"
  REDIS_URL: "redis://redis.healthcare-oab:6379"
  JWT_ACCESS_SECRET: "CHANGE_ME_min_32_bytes_access_secret_xxxxx"
  JWT_REFRESH_SECRET: "CHANGE_ME_min_32_bytes_refresh_secret_xxxx"
  PHI_ENCRYPTION_KEY: "CHANGE_ME_base64_32_byte_phi_key_xxxxxxxxx"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: oab-api-migrate
  namespace: healthcare-oab
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/healthcare-oab/api:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: oab-api-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oab-api
  namespace: healthcare-oab
  labels:
    app: oab-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: oab-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: oab-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: api
          image: ghcr.io/healthcare-oab/api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: oab-api-config
            - secretRef:
                name: oab-api-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: oab-api
  namespace: healthcare-oab
spec:
  selector:
    app: oab-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oab-api
  namespace: healthcare-oab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oab-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oab-api
  namespace: healthcare-oab
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["api.healthcare-oab.example"]
      secretName: oab-api-tls
  rules:
    - host: api.healthcare-oab.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oab-api
                port:
                  number: 80
