# Auto-provision dashboards from /var/lib/grafana/dashboards (mounted in compose).
apiVersion: 1

providers:
  - name: healthcare-oab
    orgId: 1
    folder: HealthCareOAB
    type: file
    disableDeletion: false
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
