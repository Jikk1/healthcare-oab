# ============================================================
# HealthCareOAB+ API — Prometheus alerting rules
# Metric names come from backend/src/shared/metrics.ts.
# Visible in the Prometheus UI (/alerts); route to Alertmanager in prod.
# ============================================================
groups:
  - name: oab-api-availability
    rules:
      - alert: ApiTargetDown
        expr: up{job="healthcare-oab-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API target is down"
          description: "Prometheus cannot scrape {{ $labels.instance }} for over 1 minute."

  - name: oab-api-errors
    rules:
      - alert: HighServerErrorRate
        # >5% of requests returning 5xx over 5 minutes.
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
            / clamp_min(sum(rate(http_requests_total[5m])), 1)
            > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate (>5%)"
          description: "5xx ratio is {{ $value | humanizePercentage }} over the last 5m."

      - alert: AuthFailureSpike
        expr: sum(rate(auth_events_total{outcome="failure"}[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated authentication failures"
          description: "Failed auth events at {{ $value | humanize }}/s for 10m — possible brute force."

  - name: oab-api-latency
    rules:
      - alert: HighRequestLatencyP99
        # p99 latency above 1s for 10 minutes.
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p99 request latency > 1s"
          description: "p99 latency is {{ $value | humanizeDuration }} over the last 5m."
