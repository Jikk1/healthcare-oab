# Prometheus scrape config for the HealthCareOAB+ API (RED metrics at /metrics).
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: healthcare-oab

scrape_configs:
  - job_name: healthcare-oab-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']
        labels:
          service: healthcare-oab-api

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
