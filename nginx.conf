# ============================================================
# HealthCareOAB+ frontend — nginx static server
# ============================================================
server {
    listen       8081;
    listen       [::]:8081;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # --- gzip ---
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # --- Security headers (CSP, HSTS, nosniff, …) ---
    # NB: любой location со своим add_header теряет унаследованные, поэтому
    # snippet подключается и в server, и в каждом таком location ниже.
    include /etc/nginx/security-headers.conf;

    # --- Container healthcheck ---
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # --- Never cache the runtime config (env-specific) ---
    location = /config.js {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-store, must-revalidate";
        expires -1;
    }

    # --- Long-cache immutable, content-hashed build assets (Vite /assets/*) ---
    location /assets/ {
        include /etc/nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- HTML must always revalidate so deploys are picked up ---
    location ~* \.html$ {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
