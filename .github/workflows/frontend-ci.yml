name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - '*.js'
      - '*.html'
      - '*.css'
      - 'public/**'
      - 'test/frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'vitest.config.js'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - '*.js'
      - '*.html'
      - '*.css'
      - 'public/**'
      - 'test/frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'vitest.config.js'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch: {}

jobs:
  quality:
    name: Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
