# ============================================================
# HealthCareOAB+ — общие security-заголовки (включается во все location)
# ------------------------------------------------------------
# В nginx add_header НЕ наследуется в location, где есть свой add_header,
# поэтому этот файл подключается (include) в server и в каждом таком location.
# ============================================================

add_header X-Content-Type-Options "nosniff"                          always;
add_header X-Frame-Options        "DENY"                             always;
add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
add_header Cross-Origin-Opener-Policy "same-origin"                  always;
add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

# HSTS: предполагается терминация TLS на ingress/прокси (контейнер слушает :8081 http).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Content-Security-Policy.
# - script-src/style-src содержат 'unsafe-inline', т.к. в разметке есть inline
#   onclick-обработчики и style-атрибуты + inline <script type=module>.
#   Ужесточение (снятие 'unsafe-inline') требует переноса обработчиков на
#   addEventListener и вынесения inline-стилей — отдельная задача харднинга.
# - connect-src 'self' https: — same-origin + любой HTTPS-API (адрес API задаётся
#   в рантайме через config.js, поэтому конкретный origin здесь не зашит;
#   на проде рекомендуется заменить на точный домен API).
# - frame-ancestors 'none' — защита от кликджекинга (дублирует X-Frame-Options).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;
